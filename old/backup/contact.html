<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PayPals — Contact</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="site-header">
        <nav class="nav container">
            <a class="logo" href="index.html">
                <svg width="28" height="28" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5" />
                    <path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
                <span>PayPals</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="features.html">Features</a></li>
                <li><a href="about.html">About</a></li>
                <li><a class="active" href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container contact-page">
        <section class="page-title">
            <h1>Contact</h1>
            <p class="lead">Questions, suggestions, or collaboration requests — drop a message below.</p>
        </section>

        <section class="contact-form">
            <form id="contactForm" onsubmit="return false" aria-label="Contact form">
                <label for="name">Name</label>
                <input id="name" type="text" placeholder="Your name" required />

                <label for="email">Email</label>
                <input id="email" type="email" placeholder="you@example.com" required />

                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="Write your message..." required></textarea>

                <div class="form-actions">
                    <button class="btn primary" id="sendMsg">Send Message</button>
                    <button class="btn outline backend-btn" data-action="view-github">View Repo</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div>© <span id="year4"></span> PayPals</div>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="features.html">Features</a>
            </div>
        </div>
    </footer>

    <div id="modal" class="modal" aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true">
            <button class="modal-close" id="modalCloseContact" aria-label="Close modal">&times;</button>
            <div id="modalContentContact" class="modal-content"></div>
            <div class="modal-actions">
                <button class="btn primary" id="modalOkContact">OK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
